# sweep_config.yaml
program: fine_tuning.py
method: bayes  # bayes, random, o grid
metric:
  name: eval/loss
  goal: minimize

parameters:
  # Learning rate 
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  
  # LoRA rank 
  lora_r:
    values: [8, 16, 32]
  
  # LoRA alpha - Usually set to lora_r * n
  lora_alpha:
    values: [16, 32, 64]
  
  # Epochs
  num_train_epochs:
    values: [3, 5, 8]
  
  # Batch size
  per_device_train_batch_size:
    values: [4, 8, 12]
  
  gradient_accumulation_steps:
    values: [4, 6, 8]
  
  # Dropout
  lora_dropout:
    distribution: uniform
    min: 0.0
    max: 0.1
  
  # Warmup
  warmup_ratio:
    values: [0.05, 0.1, 0.15]

# Opcional: early termination para parar runs malos
early_terminate:
  type: hyperband
  min_iter: 3