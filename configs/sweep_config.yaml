# sweep_config.yaml
program: fine_tuning.py
method: random  # bayes, random, o grid
metric:
  name: eval/loss
  goal: minimize

name: qwen-toolcalling-lora

parameters:
  # Learning rate 
  learning_rate:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-3
  
  # LoRA rank 
  lora_r:
    values: [8, 16, 32]
  
  # LoRA alpha - Usually set to lora_r * n
  lora_alpha:
    values: [16, 32, 64]
  
  # Epochs
  num_train_epochs:
    values: [1, 2, 3]
  
  gradient_accumulation_steps:
    values: [8, 16, 32, 64]
  
  # Dropout
  lora_dropout:
    distribution: uniform
    min: 0.0
    max: 0.1
  
  # Warmup
  warmup_ratio:
    values: [0.05, 0.1, 0.15]

run_cap: 10